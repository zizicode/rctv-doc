version: "3.8"

services:
  db:
    image: postgres:16
    container_name: rc_media_postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: rctv
      POSTGRES_PASSWORD: rctv@01
      POSTGRES_DB: media_db
    volumes:
      - ./init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    networks:
      - rc_media_net
volumes:
  pgdata: